<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#38bdf8);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:900px;
}

.header{
    text-align:center;
    color:#fff;
    margin-bottom:30px;
}

.header h1{
    font-size:42px;
    margin-bottom:10px;
}

.header p{
    opacity:.8;
}

.search-box{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-top:25px;
    flex-wrap:wrap;
}

.search-box input{
    width:320px;
    padding:14px 20px;
    border:none;
    border-radius:50px;
    outline:none;
    font-size:16px;
}

.search-box button{
    padding:14px 24px;
    border:none;
    border-radius:50px;
    background:#0ea5e9;
    color:#fff;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
}

.search-box button:hover{
    background:#0284c7;
}

.weather-card{
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.15);
    border-radius:25px;
    padding:30px;
    color:#fff;
    box-shadow:0 15px 35px rgba(0,0,0,.25);
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:20px;
}

.location{
    font-size:32px;
    font-weight:700;
}

.temp{
    font-size:72px;
    font-weight:bold;
    line-height:1;
    margin:10px 0;
}

.condition{
    font-size:18px;
    text-transform:capitalize;
    opacity:.9;
}

.weather-icon{
    width:140px;
}

.stats{
    margin-top:30px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
    gap:15px;
}

.stat{
    background:rgba(255,255,255,.08);
    padding:20px;
    border-radius:18px;
    text-align:center;
}

.stat h4{
    font-size:14px;
    color:#cbd5e1;
    margin-bottom:10px;
}

.stat p{
    font-size:24px;
    font-weight:600;
}

.loading,
.error{
    text-align:center;
    color:#fff;
    margin-top:20px;
    font-size:18px;
}

@media(max-width:768px){

    .temp{
        font-size:55px;
    }

    .location{
        font-size:26px;
    }

    .top{
        justify-content:center;
        text-align:center;
    }

    .search-box input{
        width:100%;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>🌤 Weather Dashboard</h1>
        <p>Current Weather & Location Detection</p>

        <div class="search-box">
            <input
                type="text"
                id="cityInput"
                placeholder="Enter city name"
            >

            <button id="searchBtn">
                Search
            </button>
        </div>
    </div>

    <div id="weatherSection"></div>

</div>

<script>

  const apiKey = "4d8fb5b93d4af21d66a2948710284366";

const cityInput = document.getElementById("cityInput");
const searchBtn = document.getElementById("searchBtn");
const weatherSection = document.getElementById("weatherSection");

async function getWeatherByCity(city){

    weatherSection.innerHTML =
        '<div class="loading">Loading weather...</div>';

    try{

        const response = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`
        );

        const data = await response.json();

        if(data.cod !== 200){
            throw new Error("City not found");
        }

        displayWeather(data);

    }catch(error){

        weatherSection.innerHTML = `
            <div class="error">
                City not found
            </div>
        `;
    }
}

async function getWeatherByLocation(lat, lon){

    weatherSection.innerHTML =
        '<div class="loading">Getting your location weather...</div>';

    try{

        const response = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${apiKey}&units=metric`
        );

        const data = await response.json();

        displayWeather(data);

    }catch(error){

        weatherSection.innerHTML = `
            <div class="error">
                Unable to load weather data
            </div>
        `;
    }
}

function displayWeather(data){

    weatherSection.innerHTML = `
    
        <div class="weather-card">

            <div class="top">

                <div>
                    <div class="location">
                        📍 ${data.name}
                    </div>

                    <div class="temp">
                        ${Math.round(data.main.temp)}°
                    </div>

                    <div class="condition">
                        ${data.weather[0].description}
                    </div>
                </div>

                <div>
                    <img
                        class="weather-icon"
                        src="https://openweathermap.org/img/wn/${data.weather[0].icon}@4x.png"
                        alt="weather"
                    >
                </div>

            </div>

            <div class="stats">

                <div class="stat">
                    <h4>Humidity</h4>
                    <p>${data.main.humidity}%</p>
                </div>

                <div class="stat">
                    <h4>Wind Speed</h4>
                    <p>${data.wind.speed}</p>
                </div>

                <div class="stat">
                    <h4>Feels Like</h4>
                    <p>${Math.round(data.main.feels_like)}°C</p>
                </div>

                <div class="stat">
                    <h4>Pressure</h4>
                    <p>${data.main.pressure}</p>
                </div>

            </div>

        </div>

    `;
}

searchBtn.addEventListener("click", () => {

    const city = cityInput.value.trim();

    if(city){
        getWeatherByCity(city);
    }
});

cityInput.addEventListener("keypress", (e) => {

    if(e.key === "Enter"){

        const city = cityInput.value.trim();

        if(city){
            getWeatherByCity(city);
        }
    }
});

navigator.geolocation.getCurrentPosition(

    position => {

        const lat = position.coords.latitude;
        const lon = position.coords.longitude;

        getWeatherByLocation(lat, lon);
    },

    () => {

        getWeatherByCity("Jaipur");
    }
);

</script>

</body>
</html>
