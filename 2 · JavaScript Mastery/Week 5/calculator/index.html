<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;  
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0ACEFE, #2699FB);
        }

        .calculator {
            width: 350px;
            background: #fff;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, .2);
        }

        .display {
            width: 100%;
            height: 70px;
            border: none;
            outline: none;
            background: #f5f5f5;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: right;
            padding: 15px;
            font-size: 32px;
            font-weight: bold;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 60px;
            border: none;
            border-radius: 10px;
            font-size: 22px;
            cursor: pointer;
            transition: .3s;
        }

        button:hover {
            transform: translateY(-3px);
        }

        .number {
            background: #f1f1f1;
        }

        .operator {
            background: #2699FB;
            color: #fff;
        }

        .clear {
            background: #ff4d4d;
            color: #fff;
        }

        .equal {
            background: #00b894;
            color: #fff;
            grid-column: span 2;
        }
    </style>
</head>

<body>

    <div class="calculator">

        <input type="text" id="display" class="display" readonly>

        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">AC</button>
            <button class="operator" onclick="appendValue('/')">/</button>
            <button class="operator" onclick="appendValue('*')">*</button>
            <button class="operator" onclick="deleteLast()">⌫</button>

            <button class="number" onclick="appendValue('7')">7</button>
            <button class="number" onclick="appendValue('8')">8</button>
            <button class="number" onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('-')">-</button>

            <button class="number" onclick="appendValue('4')">4</button>
            <button class="number" onclick="appendValue('5')">5</button>
            <button class="number" onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('+')">+</button>

            <button class="number" onclick="appendValue('1')">1</button>
            <button class="number" onclick="appendValue('2')">2</button>
            <button class="number" onclick="appendValue('3')">3</button>
            <button class="operator" onclick="appendValue('%')">%</button>

            <button class="number" onclick="appendValue('0')">0</button>
            <button class="number" onclick="appendValue('.')">.</button>
            <button class="equal" onclick="calculate()">=</button>
        </div>

    </div>

    <script>
        const display = document.getElementById("display");

        function appendValue(value) {
            display.value += value;
        }

        function clearDisplay() {
            display.value = "";
        }

        function deleteLast() {
            display.value = display.value.slice(0, -1);
        }

        function calculate() {
            try {
                display.value = eval(display.value);
            }
            catch {
                display.value = "Error";
            }
        }
    </script>

</body>

</html>
